<!DOCTYPE html>
<html>
<head>
  <title>Coin Showcase Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f5f7fb; }
    .card {
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      border: 0;
    }
    .preview-img{
      max-height: 260px;
      object-fit: contain;
      border-radius: 12px;
      border: 1px solid #eee;
      padding: 8px;
      background: #fff;
    }
    .final-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .final-img{
      max-width: 900px;
      width: 100%;
      border-radius: 14px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.16);
      background:#fff;
      padding: 10px;
    }
  </style>
</head>

<body>
<div class="container py-5">

  <h2 class="text-center mb-4">🪙 Coin Showcase Generator</h2>

  <div class="card p-4">
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Front Coin</label>
          <input type="file" name="front" class="form-control" accept="image/*"
                 onchange="preview(event,'front_preview')" required>
          <img id="front_preview" class="preview-img mt-3 w-100" />
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Back Coin</label>
          <input type="file" name="back" class="form-control" accept="image/*"
                 onchange="preview(event,'back_preview')" required>
          <img id="back_preview" class="preview-img mt-3 w-100" />
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Identification Number</label>
          <input type="text" name="coin_id" class="form-control"
                 placeholder="Example: 37879-9506" required>
        </div>
      </div>

      <div class="text-center mt-4">
        <button class="btn btn-primary btn-lg px-5">Process</button>
      </div>
    </form>
  </div>

  {% if front_result %}
  <div class="card mt-5 p-4">
    <h4 class="text-center mb-4">Extracted Coins</h4>

    <div class="row text-center g-4">
      <div class="col-md-6">
        <h5 class="mb-3">Front</h5>
        <div class="row g-3">
          <div class="col-6">
            <div class="text-muted mb-1">Original</div>
            <img src="{{ front_original }}" class="preview-img w-100">
          </div>
          <div class="col-6">
            <div class="text-muted mb-1">Processed</div>
            <img src="{{ front_result }}" class="preview-img w-100">
            <div class="mt-2">
              <a href="{{ front_result }}" download class="btn btn-success btn-sm">Download</a>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <h5 class="mb-3">Back</h5>
        <div class="row g-3">
          <div class="col-6">
            <div class="text-muted mb-1">Original</div>
            <img src="{{ back_original }}" class="preview-img w-100">
          </div>
          <div class="col-6">
            <div class="text-muted mb-1">Processed</div>
            <img src="{{ back_result }}" class="preview-img w-100">
            <div class="mt-2">
              <a href="{{ back_result }}" download class="btn btn-success btn-sm">Download</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  {% endif %}

  {% if final_result %}
  <div class="card mt-5 p-4 text-center">
    <h4 class="mb-4">Final Image</h4>

    <div class="final-wrap">
      <img src="{{ final_result }}" class="final-img" />
    </div>

    <div class="mt-3">
      <a href="{{ final_result }}" download class="btn btn-success">Download Final</a>
    </div>
  </div>
  {% endif %}

</div>

<script>
  function preview(event,id){
    const file = event.target.files?.[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(){
      document.getElementById(id).src = reader.result;
    }
    reader.readAsDataURL(file);
  }
</script>

</body>
</html>
